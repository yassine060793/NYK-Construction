<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>NYK - لوحة الإدارة</title>
  <script>
    // 1. منع النظام من البحث عن ملف config.yml الخارجي
    window.CMS_MANUAL_INIT = true;

    // 2. كاشف أخطاء عام
    window.onerror = function(msg, url, line) {
      alert("⚠️ خطأ تقني: " + msg + "\nالسطر: " + line);
      return false;
    };
  </script>
</head>
<body>
  <div id="nc-root"></div>
  <script src="https://unpkg.com/decap-cms@3.0.0/dist/decap-cms.js"></script>
  <script>
    // 3. تهيئة الإعدادات مباشرة هنا
    CMS.init({
      config: {
        backend: {
          name: "github",
          repo: "yassine060793/NYK-Construction",
          branch: "main",
          auth_endpoint: "https://github.com/login/oauth/authorize"
        },
        client_id: "Ov23liXULp5aMe8osq27",
        site_url: "https://nyk-construction.vercel.app",
        media_folder: "images/uploads",
        public_folder: "/images/uploads",
        collections: [
          { name: "projects", label: "المشاريع", folder: "content/projects", create: true, fields: [{label: "Title", name: "title", widget: "string"}] },
          { name: "news", label: "الأخبار", folder: "content/news", create: true, fields: [{label: "Title", name: "title", widget: "string"}] }
        ]
      }
    });
  </script>
</body>
</html>
