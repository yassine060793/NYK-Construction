<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>NYK - لوحة الإدارة</title>
  
  <script>
    window.onerror = function(msg, url, line) {
      alert("⚠️ خطأ تقني مكتشف:\nالرسالة: " + msg + "\nالملف: " + url + "\nالسطر: " + line);
      return false;
    };
  </script>
</head>
<body>
  <div id="nc-root"></div>
  
  <script src="https://unpkg.com/decap-cms@3.0.0/dist/decap-cms.js"></script>
  
  <script>
    // التشغيل مع التحقق من وجود CMS
    var checkExist = setInterval(function() {
      if (typeof CMS !== 'undefined') {
        clearInterval(checkExist);
        try {
          CMS.init({
            config: {
              backend: {
                name: "github",
                repo: "yassine060793/NYK---Construction",
                branch: "main"
              },
              media_folder: "images/uploads",
              public_folder: "/images/uploads",
              site_url: "https://nyk-construction.vercel.app",
              collections: [
                { name: "projects", label: "المشاريع", folder: "content/projects", create: true, fields: [{label: "Title", name: "title", widget: "string"}] },
                { name: "news", label: "الأخبار", folder: "content/news", create: true, fields: [{label: "Title", name: "title", widget: "string"}] }
              ]
            }
          });
        } catch (e) {
          alert("⚠️ خطأ في الإعدادات: " + e.message);
        }
      }
    }, 200);
  </script>
</body>
</html>
